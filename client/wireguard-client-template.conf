# Plantilla de configuración de cliente WireGuard
# Generada automáticamente o completada manualmente

[Interface]
# Clave privada del cliente (generar con: wg genkey)
PrivateKey = <CLIENTE_CLAVE_PRIVADA>
# IP asignada a este cliente en la red VPN
Address = 10.8.0.2/32
# DNS a usar mientras la VPN está activa
DNS = 1.1.1.1, 8.8.8.8

[Peer]
# Clave pública del servidor
PublicKey = <SERVIDOR_CLAVE_PUBLICA>
# IP o dominio del servidor + puerto
Endpoint = <SERVIDOR_IP>:51820
# 0.0.0.0/0 enruta todo el tráfico por la VPN
AllowedIPs = 0.0.0.0/0, ::/0
# Mantener la conexión activa (segundos)
PersistentKeepalive = 25
